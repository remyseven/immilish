workflows:
  ios-release:
    name: Immilish iOS Release
    max_build_duration: 60
    instance_type: mac_mini_m2

    integrations:
      app_store_connect: Immilish ASC Key

    environment:
      ios_signing:
        distribution_type: app_store
        bundle_identifier: com.tylm.immilish
      vars:
        BUNDLE_ID: "com.tylm.immilish"
        XCODE_PROJECT: "Immilish-Xcode-Project/Immilish/Immilish.xcodeproj"
        XCODE_SCHEME: "Immilish"
        APP_STORE_APPLE_ID: "6744648493"

    scripts:
      - name: Set Xcode version
        script: xcode-select -p

      - name: Install dependencies
        script: echo "No dependencies needed for Immilish"

      - name: Build Immilish
        script: |
          xcodebuild \
            -project "$XCODE_PROJECT" \
            -scheme "$XCODE_SCHEME" \
            -sdk iphoneos \
            -configuration Release \
            -archivePath "$CM_BUILD_DIR/Immilish.xcarchive" \
            archive \
            CODE_SIGN_STYLE=Automatic \
            DEVELOPMENT_TEAM=$CM_TEAM_ID

      - name: Export IPA
        script: |
          xcodebuild \
            -exportArchive \
            -archivePath "$CM_BUILD_DIR/Immilish.xcarchive" \
            -exportOptionsPlist /tmp/ExportOptions.plist \
            -exportPath "$CM_BUILD_DIR/export"
        
      - name: Create Export Options
        script: |
          cat > /tmp/ExportOptions.plist << EOF
          <?xml version="1.0" encoding="UTF-8"?>
          <!DOCTYPE plist PUBLIC "-//Apple//DTD PLIST 1.0//EN" "http://www.apple.com/DTDs/PropertyList-1.0.dtd">
          <plist version="1.0">
          <dict>
            <key>method</key>
            <string>app-store</string>
            <key>teamID</key>
            <string>$CM_TEAM_ID</string>
            <key>signingStyle</key>
            <string>automatic</string>
            <key>uploadBitcode</key>
            <false/>
            <key>uploadSymbols</key>
            <true/>
          </dict>
          </plist>
          EOF

    artifacts:
      - $CM_BUILD_DIR/export/*.ipa
      - $CM_BUILD_DIR/Immilish.xcarchive

    publishing:
      app_store_connect:
        auth: integration
        submit_to_testflight: true
        submit_to_app_store: false
